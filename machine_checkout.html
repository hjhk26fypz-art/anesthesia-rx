<style>
:root{--bg:#0a0f14;--sf:#111820;--sf2:#182030;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--ac:#00e5a0;--rd:#ff4d6d;--am:#ffb547;--bl:#4da6ff;--tx:#e8f0f8;--mu:rgba(232,240,248,0.45);--fa:rgba(232,240,248,0.18)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;background:var(--bg)}
body{font-family:'DM Mono',monospace;color:var(--tx);display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.topbar{position:sticky;top:0;z-index:100;padding:calc(env(safe-area-inset-top,0px)+12px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px}
.app-title span{color:var(--ac)}
.topbar-right{display:flex;align-items:center;gap:10px}
.reset-btn{font-size:11px;padding:5px 12px;border-radius:999px;border:1px solid var(--bd2);background:transparent;color:var(--mu);cursor:pointer;font-family:'DM Mono',monospace}
.progress-ring{position:relative;width:40px;height:40px}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .track{fill:none;stroke:var(--sf2);stroke-width:3}
.progress-ring .fill{fill:none;stroke:var(--ac);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.4s}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ac)}
.phase-tabs{display:flex;overflow-x:auto;gap:0;background:var(--sf);border-bottom:1px solid var(--bd);scrollbar-width:none}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{flex-shrink:0;padding:10px 14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none}
.phase-tab .pip{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--fa);margin-right:5px;vertical-align:middle}
.phase-tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.phase-tab.done .pip{background:var(--ac)}
.phase-tab.partial .pip{background:var(--am)}
.content{flex:1;overflow-y:auto;padding:0 0 calc(env(safe-area-inset-bottom,0px)+16px)}
.section{display:none;padding:14px 16px}
.section.active{display:block}
.sec-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--mu);margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bd)}
.item{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:12px;border:1px solid var(--bd);background:var(--sf);margin-bottom:6px;cursor:pointer;-webkit-user-select:none;user-select:none}
.item:active{background:var(--sf2)}
.item.urgent{border-color:rgba(255,77,109,0.35);background:rgba(255,77,109,0.05)}
.item.urgent .check-box{border-color:var(--rd)}
.item.checked{opacity:0.42}
.item.checked .label-text{text-decoration:line-through;color:var(--mu)}
.item.checked .check-box{background:var(--ac);border-color:var(--ac)}
.check-box{width:20px;height:20px;min-width:20px;border-radius:5px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;margin-top:1px}
.check-icon{display:none;width:11px;height:9px}
.check-icon path{fill:none;stroke:#000;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.item.checked .check-icon{display:block}
.label-wrap{flex:1;min-width:0}
.label-text{font-size:13px;line-height:1.45}
.note-text{font-size:11px;color:var(--mu);margin-top:2px;line-height:1.4}
.urgent-badge{font-size:9px;background:rgba(255,77,109,0.15);color:var(--rd);border:1px solid rgba(255,77,109,0.3);border-radius:4px;padding:1px 5px;display:inline-block;margin-right:4px;vertical-align:middle}
.footer{padding:12px 20px calc(env(safe-area-inset-bottom,0px)+12px);border-top:1px solid var(--bd);background:var(--bg);display:flex;gap:8px}
.btn{flex:1;padding:12px;border-radius:10px;border:1px solid var(--bd2);background:var(--sf);font-family:'DM Mono',monospace;font-size:12px;color:var(--mu);cursor:pointer}
.btn-reset{color:var(--rd);border-color:rgba(255,77,109,0.3)}
.btn-accent{color:var(--ac);border-color:rgba(0,229,160,0.3)}
.fda-banner{background:rgba(77,166,255,0.08);border:1px solid rgba(77,166,255,0.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--bl);line-height:1.5}
</style>
</head>
<body>

<div class="topbar">
  <div class="app-title">Machine<span>RX</span></div>
  <div class="topbar-right">
    <button class="reset-btn" onclick="resetAll()">New Case</button>
    <div class="progress-ring">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle class="track" cx="20" cy="20" r="17"/>
        <circle class="fill" id="ringFill" cx="20" cy="20" r="17" stroke-dasharray="106.8" stroke-dashoffset="106.8"/>
      </svg>
      <div class="ring-label" id="ringLabel">0%</div>
    </div>
  </div>
</div>

<div class="phase-tabs" id="phaseTabs"></div>
<div class="content" id="mainContent"></div>

<div class="footer">
  <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
  <button class="btn btn-accent" onclick="nextPhase()">Next →</button>
</div>

<script>
var PHASES = [
  {
    id:'p1', label:'O2 & Gas',
    groups:[
      {title:'Oxygen supply',items:[
        {l:'Pipeline O2 pressure 50–55 psi confirmed',u:1,n:'Check wall gauge — green gauge reading'},
        {l:'Backup O2 cylinder present and > 1000 psi',u:1,n:'Open cylinder valve, read gauge, close valve'},
        {l:'O2 cylinder valve closed after check',n:'Leave pipeline as primary source'},
        {l:'Low O2 pressure alarm tested and functional',u:1,n:'Disconnect pipeline briefly — alarm should sound'},
        {l:'O2 flush valve tested — high flow delivered',n:'Press O2 flush, confirm high flow at circuit'},
      ]},
      {title:'Medical gases',items:[
        {l:'N2O pipeline pressure 50–55 psi (if used)',n:'Yellow gauge'},
        {l:'Air pipeline pressure 50–55 psi (if used)',n:'Yellow/black gauge'},
        {l:'All pipeline hoses correctly seated and color-coded',n:'DISS fittings — O2 green, N2O blue, Air yellow'},
        {l:'Gas cylinders on machine closed (pipeline primary)',n:'Prevent accidental cylinder depletion'},
      ]},
      {title:'Vaporizer',items:[
        {l:'Correct volatile agent confirmed for case',u:1,n:'Verify with surgeon / anesthesia plan'},
        {l:'Vaporizer filled to appropriate level',n:'Not overfilled — between min and max marks'},
        {l:'Vaporizer locked in OFF position',n:'No other vaporizer simultaneously selected'},
        {l:'Vaporizer dial turns smoothly, no leaks',n:'Check filler cap tight'},
        {l:'Desflurane vaporizer heated and ready (if used)',n:'Must warm up 5–10 min before use'},
      ]},
    ]
  },
  {
    id:'p2', label:'Machine',
    groups:[
      {title:'Machine power and displays',items:[
        {l:'Machine powered ON — self-test complete',u:1,n:'Follow machine prompts if automated checkout'},
        {l:'All displays functioning — no error messages',n:''},
        {l:'Date and time correct on machine display',n:'Affects log / record accuracy'},
        {l:'Backup battery functional (if applicable)',n:'Check indicator light'},
      ]},
      {title:'Flowmeters and controls',items:[
        {l:'Flowmeters moving freely — no sticking',n:'O2, N2O, Air floats move with dial'},
        {l:'Minimum O2 flow maintained when N2O on',n:'Hypoxic guard functional — O2 should not drop < 25%'},
        {l:'Flowmeters read zero when all off',n:''},
        {l:'All knobs turn smoothly without resistance',n:''},
      ]},
      {title:'Leak test (low pressure system)',items:[
        {l:'Negative pressure leak test (bulb method) OR machine automated leak test passed',u:1,n:'Squeeze bulb — should not re-expand in 10s'},
        {l:'No audible gas leaks from machine, circuit, or connections',n:'Listen carefully'},
        {l:'Common gas outlet connection tight',n:'Where circuit connects to machine'},
      ]},
    ]
  },
  {
    id:'p3', label:'Circuit',
    groups:[
      {title:'Breathing circuit',items:[
        {l:'Correct circuit selected for case (adult / peds)',u:1,n:'Adult: 2L bag. Peds: appropriate small circuit'},
        {l:'Circuit connections tight — all ports seated',n:'Y-piece, inspiratory/expiratory limbs, elbow'},
        {l:'Circuit free of cracks, holes, or damage',n:'Visually inspect entire circuit'},
        {l:'New circuit or circuit verified clean',n:'Per institutional protocol'},
        {l:'HME / bacterial filter in place (if used)',n:'Between circuit and patient connection'},
        {l:'ETCO2 sampling line connected and patent',n:''},
        {l:'Pressure manometer present and functional',n:'Reads zero at rest'},
      ]},
      {title:'Bag and bellows',items:[
        {l:'Reservoir bag correct size and attached',n:'Adult: 3L. Peds: 1L or 500 mL'},
        {l:'Bag fills and empties appropriately',n:'Squeeze bag — pressure rises, vent to decompress'},
        {l:'Bellows assembly intact (if bellow ventilator)',n:'Check for tears or cracks'},
        {l:'APL valve moves freely — tested at multiple settings',u:1,n:'Open → close → partially open'},
        {l:'APL valve set appropriately for mask ventilation',n:'Set to 30–40 cmH2O for induction'},
      ]},
      {title:'CO2 absorbent',items:[
        {l:'CO2 absorbent color normal — not exhausted',u:1,n:'Soda lime: white/off-white. Spent = purple/violet'},
        {l:'Absorbent canister full — no channeling',n:'Gently shake canister to assess'},
        {l:'Canister seated and locked properly',n:'No gaps in circuit'},
        {l:'Absorbent changed if > 8 hrs use or color changed',n:''},
      ]},
      {title:'Unidirectional valves',items:[
        {l:'Inspiratory valve opens on inspiration',n:'Watch disc movement during test breath'},
        {l:'Expiratory valve opens on expiration',n:'Watch disc movement during test breath'},
        {l:'Both valves seated properly — no leaks around disc',n:''},
      ]},
    ]
  },
  {
    id:'p4', label:'Ventilator',
    groups:[
      {title:'Ventilator setup',items:[
        {l:'Ventilator mode selected appropriately',n:'VCV, PCV, or SIMV per preference'},
        {l:'Tidal volume set — 6–8 mL/kg IBW (default)',n:'Adjust after connecting patient'},
        {l:'Rate set — default 10–12 bpm',n:''},
        {l:'PEEP set — default 5 cmH2O',n:'Adjust per case'},
        {l:'FiO2 set — 100% for induction, adjust for maintenance',n:''},
        {l:'I:E ratio set — default 1:2',n:''},
        {l:'Pressure limit set — 30–40 cmH2O',n:'Prevents barotrauma'},
      ]},
      {title:'Ventilator function test',items:[
        {l:'Ventilator tested with circuit occluded — pressure rises',u:1,n:'Occlude Y-piece — vent cycles — pressure should build'},
        {l:'Delivered tidal volumes match set values',n:'Watch spirometer or digital readout'},
        {l:'No leak alarm triggered during test breath',n:''},
        {l:'Inspiratory and expiratory times appropriate',n:''},
        {l:'Ventilator alarm limits set and active',u:1,n:'Low pressure, high pressure, apnea, disconnect'},
      ]},
      {title:'Manual to vent switch',items:[
        {l:'Switch between manual bag and vent tested',n:'Both modes functional'},
        {l:'APL valve bypassed when vent mode active',n:'Confirm vent controls circuit pressure in vent mode'},
      ]},
    ]
  },
  {
    id:'p5', label:'Monitors',
    groups:[
      {title:'Monitoring equipment',items:[
        {l:'SpO2 probe attached and waveform present',u:1,n:'Pleth waveform visible, reading stable'},
        {l:'ETCO2 sampling line connected — waveform confirmed',u:1,n:'Normal capnography waveform shape'},
        {l:'NIBP cuff correct size and cycling',n:'Verify reading within expected range for patient'},
        {l:'EKG leads attached — normal sinus rhythm confirmed',n:'All 5 leads, II and V5 minimum'},
        {l:'Temperature probe available and functional',n:'Esophageal, rectal, or skin as appropriate'},
        {l:'Neuromuscular monitoring (TOF) available',n:'Electrodes, stimulator, and quantitative device'},
        {l:'Invasive arterial line setup ready (if planned)',n:'Transducer, tubing, flush, zeroing stopcock'},
        {l:'BIS / depth of anesthesia monitor ready (if used)',n:''},
      ]},
      {title:'Alarm settings',items:[
        {l:'SpO2 low alarm: 92–94%',u:1,n:'Adjust per patient if chronic hypoxemia'},
        {l:'ETCO2 high alarm: 50 mmHg',n:''},
        {l:'ETCO2 low alarm: 25 mmHg',n:'Detect disconnect / apnea'},
        {l:'NIBP high alarm set appropriately',n:''},
        {l:'HR alarms set: 40 low, 120 high (adjust per pt)',n:''},
        {l:'Apnea alarm active',u:1,n:''},
        {l:'All alarms audible — volume adequate for OR noise',u:1,n:''},
      ]},
    ]
  },
  {
    id:'p6', label:'Airway',
    groups:[
      {title:'Airway equipment',items:[
        {l:'Laryngoscope handle charged — light bright, blade tight',u:1,n:'Test light before every case'},
        {l:'Correct blade size selected for patient',n:'Mac 3–4 adult. Miller for peds or difficult airway.'},
        {l:'Video laryngoscope charged and on (if planned)',n:'GlideScope, C-MAC, etc.'},
        {l:'Video laryngoscope blade clean and attached',n:''},
        {l:'ETT correct size selected — cuff intact',u:1,n:'Adult male: 7.5–8.0. Adult female: 7.0–7.5'},
        {l:'ETT cuff tested — no leak on inflation',n:'Inflate, check symmetry, deflate'},
        {l:'Stylet in ETT — tip bent appropriately',n:'Bend 35 degrees at distal 1/3'},
        {l:'10 mL syringe for cuff attached to ETT',n:''},
        {l:'ETT tape / holder ready',n:''},
        {l:'LMA correct size available and checked',n:'Adult female: 3–4. Adult male: 4–5'},
        {l:'Supraglottic airway backup available',u:1,n:''},
      ]},
      {title:'Difficult airway',items:[
        {l:'Difficult airway cart location confirmed',u:1,n:'Know exactly where it is before case starts'},
        {l:'Fiberoptic scope available (if anticipated DA)',n:'Checked, charged, white-balanced'},
        {l:'Bougie available and accessible',n:''},
        {l:'Surgical airway kit location known',u:1,n:'Cricothyrotomy kit — CICO plan'},
        {l:'Airway assessment reviewed — plan A, B, C documented',u:1,n:''},
      ]},
      {title:'Suction',items:[
        {l:'Suction ON and functional — adequate vacuum',u:1,n:'Test by occluding tip — strong suction'},
        {l:'Yankauer at bedside and within reach',u:1,n:''},
        {l:'Suction tubing connected and kink-free',n:''},
        {l:'Suction canister not full',n:''},
      ]},
    ]
  },
  {
    id:'p7', label:'Drugs & IV',
    groups:[
      {title:'Emergency drugs — must be drawn before every case',items:[
        {l:'Ephedrine 5 mg/mL drawn and labeled',u:1,n:'Standard: 50 mg in 10 mL NS'},
        {l:'Phenylephrine 100 mcg/mL drawn and labeled',u:1,n:'Standard: 10 mg in 100 mL NS or bolus syringe'},
        {l:'Atropine 0.4 mg/mL drawn and labeled',u:1,n:''},
        {l:'Succinylcholine 20 mg/mL drawn and labeled',u:1,n:'Standard: 200 mg in 10 mL'},
        {l:'Epinephrine 10 mcg/mL (1:100,000) drawn',u:1,n:'For anaphylaxis / cardiac — dilute 0.1 mg in 10 mL'},
      ]},
      {title:'Induction drugs',items:[
        {l:'Propofol / induction agent drawn and labeled',n:''},
        {l:'Rocuronium or NMB drawn and labeled',n:''},
        {l:'Fentanyl / opioid drawn and labeled',n:''},
        {l:'Midazolam drawn if planned',n:''},
        {l:'Ketamine drawn if planned',n:''},
        {l:'All syringes clearly labeled — drug, dose, concentration',u:1,n:''},
      ]},
      {title:'Infusions and adjuncts',items:[
        {l:'Vasopressor infusion prepared if anticipated',n:'Phenylephrine or norepinephrine drip'},
        {l:'Antiemetics drawn — dexamethasone, ondansetron',n:''},
        {l:'Antibiotics confirmed and timing noted',u:1,n:'Within 60 min of incision'},
        {l:'Reversal agents available — neostigmine/glyco or sugammadex',u:1,n:''},
        {l:'Naloxone available',n:''},
      ]},
      {title:'IV access',items:[
        {l:'IV access confirmed patent — flush without resistance',u:1,n:''},
        {l:'IV size and site appropriate for case',n:'18G minimum for most cases. 16G for blood loss risk.'},
        {l:'IV line primed — no air bubbles',n:''},
        {l:'Extension set and stopcocks secured',n:''},
        {l:'Second IV access if high blood loss risk',n:''},
        {l:'Blood tubing primed (if blood products anticipated)',n:''},
      ]},
    ]
  },
  {
    id:'p8', label:'Final',
    groups:[
      {title:'Patient safety checks',items:[
        {l:'Patient identity confirmed — 2 identifiers',u:1,n:'Name + DOB. Match armband to chart.'},
        {l:'Surgical site and side confirmed',u:1,n:'Mark visible, patient confirms if awake'},
        {l:'Consent signed and in chart',u:1,n:''},
        {l:'Allergies reviewed and communicated to team',u:1,n:''},
        {l:'NPO status confirmed',u:1,n:''},
        {l:'Pre-op H&P and labs reviewed',n:''},
        {l:'Anesthesia plan confirmed',n:'GA vs regional vs MAC, airway plan'},
        {l:'Pre-op medications given (if ordered)',n:'Midazolam, beta-blocker, etc.'},
      ]},
      {title:'Room and team',items:[
        {l:'Positioning equipment in place',n:'Bean bag, axillary roll, padding ready'},
        {l:'Warming device active — Bear Hugger on',u:1,n:'Warm patient before draping if possible'},
        {l:'Surgeon present or scrubbing',n:''},
        {l:'Time Out completed',u:1,n:'Patient, procedure, site, allergies — all team present'},
        {l:'Blood products available (if indicated)',n:'Type and screen or crossmatch in system'},
        {l:'Cell saver set up (if high EBL anticipated)',n:''},
        {l:'OR temperature set appropriately',n:'68–70°F standard. Neonates/peds higher.'},
      ]},
      {title:'Documentation',items:[
        {l:'Anesthesia record open in EPIC',n:''},
        {l:'Machine checkout documented',u:1,n:'FDA checklist or equivalent documented in record'},
        {l:'Pre-induction vitals recorded',n:''},
        {l:'Pre-op assessment note finalized',n:''},
        {l:'Anesthesia start time noted',n:''},
      ]},
    ]
  },
];

var checks = {};
var activeIdx = 0;

function ikey(pi, gi, ii) { return PHASES[pi].id + '-' + gi + '-' + ii; }

function totalItems() {
  var t = 0;
  for (var i = 0; i < PHASES.length; i++)
    for (var j = 0; j < PHASES[i].groups.length; j++)
      t += PHASES[i].groups[j].items.length;
  return t;
}
function checkedCount() {
  var c = 0, vals = Object.keys(checks);
  for (var i = 0; i < vals.length; i++) if (checks[vals[i]]) c++;
  return c;
}

function updateRing() {
  var tot = totalItems(), don = checkedCount();
  var pct = tot ? Math.round(don / tot * 100) : 0;
  var circ = 106.8;
  document.getElementById('ringFill').style.strokeDashoffset = circ - circ * pct / 100;
  document.getElementById('ringLabel').textContent = pct + '%';
  var tabs = document.querySelectorAll('.phase-tab');
  for (var pi = 0; pi < PHASES.length; pi++) {
    var tab = tabs[pi]; if (!tab) continue;
    var t = 0, d = 0;
    for (var gi = 0; gi < PHASES[pi].groups.length; gi++)
      for (var ii = 0; ii < PHASES[pi].groups[gi].items.length; ii++) {
        t++;
        if (checks[ikey(pi, gi, ii)]) d++;
      }
    tab.classList.remove('done', 'partial');
    if (d === t && t > 0) tab.classList.add('done');
    else if (d > 0) tab.classList.add('partial');
  }
}

function renderTabs() {
  var con = document.getElementById('phaseTabs');
  con.innerHTML = '';
  for (var pi = 0; pi < PHASES.length; pi++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.className = 'phase-tab' + (idx === activeIdx ? ' active' : '');
      btn.innerHTML = '<span class="pip"></span>' + PHASES[idx].label;
      btn.onclick = function() { switchPhase(idx); };
      con.appendChild(btn);
    })(pi);
  }
}

function renderContent() {
  var con = document.getElementById('mainContent');
  con.innerHTML = '';
  for (var pi = 0; pi < PHASES.length; pi++) {
    (function(pidx) {
      var sec = document.createElement('div');
      sec.className = 'section' + (pidx === activeIdx ? ' active' : '');
      sec.id = 'sec' + pidx;

      if (pidx === 0) {
        var banner = document.createElement('div');
        banner.className = 'fda-banner';
        banner.textContent = 'FDA 2008 Anesthesia Machine Checkout — complete before every case. Items marked URGENT must not be skipped.';
        sec.appendChild(banner);
      }

      for (var gi = 0; gi < PHASES[pidx].groups.length; gi++) {
        (function(gidx) {
          var g = PHASES[pidx].groups[gidx];
          var lbl = document.createElement('div');
          lbl.className = 'sec-label';
          lbl.textContent = g.title;
          sec.appendChild(lbl);

          for (var ii = 0; ii < g.items.length; ii++) {
            (function(iidx) {
              var it = g.items[iidx];
              var k = ikey(pidx, gidx, iidx);
              var row = document.createElement('div');
              row.className = 'item' + (it.u ? ' urgent' : '') + (checks[k] ? ' checked' : '');
              row.innerHTML =
                '<div class="check-box"><svg class="check-icon" viewBox="0 0 11 9"><path d="M1 4.5L4 7.5L10 1"/></svg></div>' +
                '<div class="label-wrap">' +
                  '<div class="label-text">' + (it.u ? '<span class="urgent-badge">MUST DO</span>' : '') + it.l + '</div>' +
                  (it.n ? '<div class="note-text">' + it.n + '</div>' : '') +
                '</div>';
              row.addEventListener('click', (function(k2, r) {
                return function() {
                  checks[k2] = !checks[k2];
                  r.classList.toggle('checked', checks[k2]);
                  updateRing();
                };
              })(k, row));
              sec.appendChild(row);
            })(ii);
          }
        })(gi);
      }
      con.appendChild(sec);
    })(pi);
  }
}

function switchPhase(pi) {
  activeIdx = pi;
  var tabs = document.querySelectorAll('.phase-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', i === pi);
  var secs = document.querySelectorAll('.section');
  for (var i = 0; i < secs.length; i++) secs[i].classList.toggle('active', i === pi);
  document.getElementById('mainContent').scrollTop = 0;
}

function nextPhase() {
  var n = (activeIdx + 1) % PHASES.length;
  switchPhase(n);
  var tabs = document.querySelectorAll('.phase-tab');
  if (tabs[n]) tabs[n].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function resetAll() {
  if (!confirm('Reset all checks for new case?')) return;
  checks = {};
  document.querySelectorAll('.item').forEach(function(r) { r.classList.remove('checked'); });
  updateRing();
}

renderTabs();
renderContent();
updateRing();
</script>
</body>
</html>
