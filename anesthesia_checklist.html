<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Anesthesia RX">
<meta name="theme-color" content="#0a0f14">
<title>Anesthesia RX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f14;
  --surface: #111820;
  --surface2: #182030;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #00e5a0;
  --red: #ff4d6d;
  --amber: #ffb547;
  --text: #e8f0f8;
  --muted: rgba(232,240,248,0.45);
  --faint: rgba(232,240,248,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;background:var(--bg)}
body{font-family:'DM Mono',monospace;color:var(--text);display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* TOP BAR */
.topbar{
  position:sticky;top:0;z-index:100;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.app-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px}
.app-title span{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px}
.edit-btn{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  padding:6px 12px;border-radius:999px;
  border:1px solid var(--border2);background:transparent;
  color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.edit-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(255,181,71,0.08)}
.progress-ring{position:relative;width:40px;height:40px}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .track{fill:none;stroke:var(--surface2);stroke-width:3}
.progress-ring .fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.4s}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--accent)}

/* PHASE TABS */
.phase-tabs{
  display:flex;overflow-x:auto;gap:6px;padding:12px 16px;
  background:var(--bg);border-bottom:1px solid var(--border);
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{
  flex-shrink:0;padding:7px 14px;border-radius:999px;
  border:1px solid var(--border2);background:transparent;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
  cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;
  transition:all 0.15s;
}
.phase-tab .pip{width:6px;height:6px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background 0.2s}
.phase-tab.active{background:var(--accent);border-color:var(--accent);color:#000}
.phase-tab.active .pip{background:rgba(0,0,0,0.35)}
.phase-tab.done .pip{background:var(--accent)}
.phase-tab.partial .pip{background:var(--amber)}
.add-phase-tab{
  flex-shrink:0;padding:7px 14px;border-radius:999px;
  border:1px dashed var(--border2);background:transparent;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--faint);
  cursor:pointer;white-space:nowrap;display:none;
}
.add-phase-tab.visible{display:flex;align-items:center;gap:4px}

/* CONTENT */
.content{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 16px);
  -webkit-overflow-scrolling:touch;
}
.section{display:none}
.section.active{display:block}

/* GROUP */
.group{margin-bottom:20px}
.group-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.group-label{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);
}
.group-actions{display:none;gap:4px;margin-left:auto}
.group-actions.visible{display:flex}
.group-line{flex:1;height:1px;background:var(--border)}
.mini-btn{
  font-size:10px;padding:2px 8px;border-radius:4px;
  border:1px solid var(--border2);background:transparent;
  color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;
  transition:all 0.12s;white-space:nowrap;
}
.mini-btn:active{background:var(--surface2)}
.mini-btn.danger{color:var(--red);border-color:rgba(255,77,109,0.3)}
.mini-btn.success{color:var(--accent);border-color:rgba(0,229,160,0.3)}

/* ITEM */
.item{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 12px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface);
  margin-bottom:6px;cursor:pointer;
  transition:background 0.1s,opacity 0.2s;
  -webkit-user-select:none;user-select:none;
}
.item:active{background:var(--surface2)}
.item.urgent{border-color:rgba(255,77,109,0.35);background:rgba(255,77,109,0.05)}
.item.urgent .check-box{border-color:var(--red)}
.item.checked{opacity:0.42}
.item.checked .label-text{text-decoration:line-through;color:var(--muted)}
.item.checked .check-box{background:var(--accent);border-color:var(--accent)}
.check-box{
  width:20px;height:20px;min-width:20px;border-radius:5px;
  border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;
  margin-top:1px;transition:all 0.15s;
}
.check-icon{display:none;width:11px;height:9px}
.check-icon path{fill:none;stroke:#000;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.item.checked .check-icon{display:block}
.label-wrap{flex:1;min-width:0}
.label-text{font-size:13px;line-height:1.45}
.note-text{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.urgent-badge{
  font-size:9px;background:rgba(255,77,109,0.15);color:var(--red);
  border:1px solid rgba(255,77,109,0.3);border-radius:4px;
  padding:1px 5px;display:inline-block;margin-right:4px;vertical-align:middle;
}
/* edit mode item extras */
.item-del{
  display:none;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;
  border:1px solid rgba(255,77,109,0.3);background:transparent;
  color:var(--red);font-size:16px;cursor:pointer;flex-shrink:0;
  line-height:1;margin-top:0;
}
.item-urgent-toggle{
  display:none;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;
  border:1px solid var(--border2);background:transparent;
  color:var(--amber);font-size:14px;cursor:pointer;flex-shrink:0;line-height:1;
}
.edit-mode .item-del{display:flex}
.edit-mode .item-urgent-toggle{display:flex}
.edit-mode .item{cursor:default}
.edit-mode .item:not(.editing):active{background:var(--surface)}
.edit-mode .group-actions{display:flex}
.edit-mode .add-phase-tab{display:flex}

/* ADD ITEM ROW */
.add-item-row{
  display:none;align-items:center;gap:8px;
  padding:10px 12px;border-radius:12px;
  border:1px dashed var(--border2);background:transparent;
  margin-bottom:6px;
}
.add-item-row.visible{display:flex}
.add-item-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:13px;color:var(--text);
  caret-color:var(--accent);
}
.add-item-input::placeholder{color:var(--faint)}
.add-item-btn{
  font-family:'DM Mono',monospace;font-size:11px;
  padding:5px 10px;border-radius:6px;
  border:1px solid rgba(0,229,160,0.3);background:transparent;
  color:var(--accent);cursor:pointer;white-space:nowrap;
}

/* MODALS */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.7);align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  width:100%;max-width:430px;background:var(--surface);
  border-radius:20px 20px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 24px);
  border-top:1px solid var(--border2);
}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px}
.modal-input{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:11px 14px;
  font-family:'DM Mono',monospace;font-size:13px;color:var(--text);
  outline:none;margin-bottom:10px;caret-color:var(--accent);
}
.modal-input::placeholder{color:var(--faint)}
.modal-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.modal-label{font-size:12px;color:var(--muted);flex:1}
.modal-toggle{
  width:44px;height:24px;border-radius:999px;background:var(--surface2);
  border:1px solid var(--border2);cursor:pointer;position:relative;transition:background 0.2s;
}
.modal-toggle.on{background:rgba(255,77,109,0.3);border-color:rgba(255,77,109,0.4)}
.modal-toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;background:var(--muted);
  transition:transform 0.2s,background 0.2s;
}
.modal-toggle.on::after{transform:translateX(20px);background:var(--red)}
.modal-btns{display:flex;gap:8px;margin-top:6px}
.modal-btn{
  flex:1;padding:12px;border-radius:10px;
  font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;transition:all 0.15s;
}
.modal-btn.cancel{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.modal-btn.confirm{background:var(--accent);border:1px solid var(--accent);color:#000;font-weight:500}

/* FOOTER */
.footer{
  padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 12px);
  border-top:1px solid var(--border);background:var(--bg);
  display:flex;gap:8px;
}
.btn{
  flex:1;padding:12px;border-radius:10px;
  border:1px solid var(--border2);background:var(--surface);
  font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;
}
.btn:active{background:var(--surface2)}
.btn-reset{color:var(--red);border-color:rgba(255,77,109,0.3)}
.btn-accent{color:var(--accent);border-color:rgba(0,229,160,0.3)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="app-title">Anesthesia<span>RX</span></div>
  <div class="topbar-right">
    <button class="edit-btn" id="edit-btn" onclick="toggleEditMode()">✎ Edit</button>
    <div class="progress-ring">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle class="track" cx="20" cy="20" r="17"/>
        <circle class="fill" id="ring-fill" cx="20" cy="20" r="17"
          stroke-dasharray="106.8" stroke-dashoffset="106.8"/>
      </svg>
      <div class="ring-label" id="ring-label">0%</div>
    </div>
  </div>
</div>

<!-- PHASE TABS -->
<div class="phase-tabs" id="phase-tabs">
  <button class="add-phase-tab" id="add-phase-tab" onclick="openAddPhase()">+ phase</button>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- FOOTER -->
<div class="footer">
  <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
  <button class="btn btn-accent" onclick="nextTab()">Next →</button>
</div>

<!-- ADD ITEM MODAL -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <div class="modal-title" id="item-modal-title">Add item</div>
    <input class="modal-input" id="item-label-input" placeholder="Checklist item text…" maxlength="120">
    <input class="modal-input" id="item-note-input" placeholder="Note (optional)…" maxlength="120">
    <div class="modal-row">
      <span class="modal-label">Mark as URGENT</span>
      <div class="modal-toggle" id="urgent-toggle" onclick="this.classList.toggle('on')"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeItemModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="saveItemModal()">Save</button>
    </div>
  </div>
</div>

<!-- ADD GROUP MODAL -->
<div class="modal-overlay" id="group-modal">
  <div class="modal">
    <div class="modal-title">Add group</div>
    <input class="modal-input" id="group-name-input" placeholder="Group name…" maxlength="60">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeGroupModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="saveGroupModal()">Add</button>
    </div>
  </div>
</div>

<!-- ADD PHASE MODAL -->
<div class="modal-overlay" id="phase-modal">
  <div class="modal">
    <div class="modal-title">Add phase</div>
    <input class="modal-input" id="phase-name-input" placeholder="Phase name…" maxlength="40">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closePhaseModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="savePhaseModal()">Add</button>
    </div>
  </div>
</div>

<!-- RENAME MODAL (phase or group) -->
<div class="modal-overlay" id="rename-modal">
  <div class="modal">
    <div class="modal-title" id="rename-modal-title">Rename</div>
    <input class="modal-input" id="rename-input" placeholder="New name…" maxlength="60">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeRenameModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── DEFAULT DATA ───────────────────────────────────────────────
const DEFAULT_PHASES = [
  {
    id:"post-ind", label:"Post-induction",
    groups:[
      {title:"Airway confirmed",items:[
        {l:"ETCO₂ waveform confirmed",n:"Bilateral breath sounds ✓"},
        {l:"ETT depth noted + secured",n:"Document cm at teeth in EPIC"},
        {l:"Eyes taped / lubricated",n:"Esp. prone or long cases"},
        {l:"Bite block placed if needed"},
        {l:"OG/NG placed if ordered — document output"},
      ]},
      {title:"Vent settings",items:[
        {l:"TV 6–8 mL/kg IBW, RR set, PEEP 5",n:"Adjust per case"},
        {l:"Peak/plateau pressures OK",n:"Alert if Ppeak > 30"},
        {l:"SpO₂ and EtCO₂ trending well",n:"Goal EtCO₂ 35–45"},
      ]},
      {title:"Lines & monitoring",items:[
        {l:"Art line zeroed + waveform good",n:"If placed"},
        {l:"CVP / A-line documentation started in EPIC"},
        {l:"Foley baseline output noted",n:"Goal ≥ 0.5 mL/kg/hr"},
        {l:"Temp probe placed — baseline documented"},
        {l:"Bear Hugger / warming blanket ACTIVE",urgent:true,n:"Start early — rewarm is slow"},
      ]},
    ]
  },
  {
    id:"drugs", label:"Drugs",
    groups:[
      {title:"Antibiotics",items:[
        {l:"Prophylactic ABX within 60 min of incision",urgent:true,n:"Cefazolin most common; re-dose 4 hrs or EBL 1500 mL"},
        {l:"Re-dose reminder set (long cases)"},
        {l:"Allergies cross-checked"},
      ]},
      {title:"Steroids / anti-inflam",items:[
        {l:"Dexamethasone 4–8 mg IV — give EARLY",n:"At induction, not at end"},
        {l:"Stress-dose steroids if adrenal insufficiency hx",n:"Hydrocortisone 50–100 mg"},
      ]},
      {title:"Multimodal analgesia",items:[
        {l:"Acetaminophen 1g IV",n:"Max 4g/24hr; avoid liver failure"},
        {l:"Ketorolac 15–30 mg IV near end",n:"Avoid if renal/GI risk"},
        {l:"Ketamine 0.1–0.5 mg/kg (opioid-sparing)"},
        {l:"Lidocaine infusion if ordered",n:"1.5 mg/kg load → 1.5 mg/kg/hr"},
        {l:"Dexmedetomidine if ordered"},
        {l:"Opioid plan documented for emergence/PACU"},
        {l:"Regional block charted in EPIC",n:"Adductor canal, TAP, popliteal, etc."},
      ]},
      {title:"PONV prophylaxis",items:[
        {l:"Ondansetron 4 mg — 30–60 min before end",n:"Apfel ≥ 2 → dual/triple therapy"},
        {l:"Scopolamine patch confirmed if high-risk"},
        {l:"Full bundle confirmed: dex + zofran ± scop ± TIVA"},
      ]},
      {title:"Fluids & pressors",items:[
        {l:"Fluid type + rate confirmed — running total in EPIC"},
        {l:"Blood products ordered if needed"},
        {l:"Vasopressor drip labeled + running if needed",n:"Phenylephrine, norepi, vasopressin"},
      ]},
    ]
  },
  {
    id:"chart", label:"EPIC",
    groups:[
      {title:"Required EPIC documentation",items:[
        {l:"Anesthesia type + providers documented"},
        {l:"Induction agents — drug, dose, time charted"},
        {l:"Intubation: attempt #, blade, ETT size/depth, adjuncts"},
        {l:"ALL meds — drug, dose, route, time — real-time",urgent:true},
        {l:"Fluids running total updated"},
        {l:"Urine output entered"},
        {l:"Labs reviewed — abnormals noted/acknowledged",n:"BMP, CBC, coags, ABG as applicable"},
        {l:"Positioning documented"},
        {l:"Padding + pressure points charted"},
        {l:"Temperature — initial and ongoing"},
        {l:"Intraop events documented",n:"Hypotension, laryngospasm, etc."},
        {l:"EBL updated throughout"},
      ]},
      {title:"Labs to check mid-case",items:[
        {l:"ABG if art line or complex case",n:"pH, PaO₂, PaCO₂, BE, lactate"},
        {l:"Glucose check",n:"Diabetics, long cases, peds"},
        {l:"H&H if significant EBL"},
        {l:"Coags if anticoag hx or massive transfusion"},
        {l:"ACT if heparin given",n:"Cardiac/vascular cases"},
      ]},
    ]
  },
  {
    id:"emerge", label:"Emergence",
    groups:[
      {title:"Timing — watch the field",items:[
        {l:"Identify closure stage — alert at last layer",n:"Don't wait for dressings"},
        {l:"Volatile agent down / TIVA off",n:"Increase FGF to blow off gas faster"},
        {l:"NMB reversal given",n:"Neostig 0.04–0.07 mg/kg + glyco OR sugammadex"},
        {l:"TOF ratio ≥ 0.9 confirmed",urgent:true,n:"Quantitative monitoring — do not skip"},
        {l:"Final opioid dose for smooth emergence"},
        {l:"Lidocaine 1 mg/kg IV if bucking risk",n:"Optional"},
      ]},
      {title:"Extubation criteria — ALL must pass",items:[
        {l:"Awake — eyes open, following commands",urgent:true},
        {l:"Sustained head lift > 5 sec OR strong grip"},
        {l:"Tidal volume > 5–6 mL/kg IBW spontaneous"},
        {l:"RR 10–20, regular"},
        {l:"SpO₂ ≥ 96% on ≤ 50% FiO₂"},
        {l:"ETCO₂ normalizing on spontaneous breaths"},
        {l:"Hemodynamically stable"},
        {l:"Leak test done if airway edema concern",n:"Post-ENT, prone, massive fluids"},
      ]},
      {title:"Suction & backup airway",items:[
        {l:"Suction working — Yankauer at bedside",urgent:true},
        {l:"BVM connected and tested"},
        {l:"Oral airway / NPA at bedside"},
        {l:"Video laryngoscope + LMA accessible"},
        {l:"Tape/sutures cut if surgeon secured tube"},
      ]},
      {title:"Post-extubation",items:[
        {l:"Supplemental O₂ applied immediately",n:"NRB or simple mask"},
        {l:"PACU handoff talking points ready",n:"Case summary, events, pain plan, PONV Rx"},
        {l:"PACU orders in EPIC — pain, antiemetics, vitals"},
        {l:"Anesthesia record signed or in progress"},
      ]},
    ]
  },
  {
    id:"next", label:"Next Pt",
    groups:[
      {title:"Read the chart",items:[
        {l:"H&P, PMHx, PSHx, meds, allergies reviewed"},
        {l:"Airway assessment: Mallampati, ROM, thyromental, BMI"},
        {l:"Labs reviewed",n:"CBC, BMP, coags, echo, PFTs as needed"},
        {l:"Anesthesia plan decided",n:"GA vs. regional vs. MAC"},
        {l:"Difficult airway / backup plan identified"},
        {l:"Consent confirmed"},
        {l:"NPO status confirmed"},
        {l:"GLP-1 status noted",n:"Extended fasting risk"},
      ]},
      {title:"Draw drugs",items:[
        {l:"Propofol / induction agent — drawn + labeled",urgent:true},
        {l:"Succinylcholine — drawn + labeled",urgent:true},
        {l:"Rocuronium (or NMB) — drawn + labeled"},
        {l:"Fentanyl / opioid — drawn + labeled"},
        {l:"Ephedrine 5 mg/mL — ready"},
        {l:"Phenylephrine / vasopressor — ready"},
        {l:"Atropine — drawn + labeled"},
        {l:"Lidocaine (intubation / topicalization)"},
        {l:"Antiemetics — ondansetron, dex drawn"},
        {l:"Emergency drugs verified",n:"Epi + atropine minimum"},
      ]},
      {title:"Airway setup",items:[
        {l:"ETT size selected — cuffed, correct ID",n:"Have one size above/below"},
        {l:"Laryngoscope — light bright, blade tight"},
        {l:"Video laryngoscope charged + on"},
        {l:"Stylet in ETT"},
        {l:"Cuff checked — 10cc syringe attached"},
        {l:"Tape / ETT holder ready"},
        {l:"LMA correct size (backup)"},
        {l:"Difficult airway cart location confirmed"},
        {l:"Suction checked + functional"},
        {l:"Circuit / machine check done",n:"If new room"},
      ]},
      {title:"Room & equipment",items:[
        {l:"Machine checked — O₂, agent, vaporizer, circuit"},
        {l:"All monitors working",n:"SpO₂, EtCO₂, NIBP, EKG, temp"},
        {l:"IV access plan confirmed",n:"Gauge, site, length for procedure"},
        {l:"Bear Hugger / warming set up"},
        {l:"Positioning equipment ready",n:"Bean bag, axillary roll, etc."},
        {l:"Cell saver available if high EBL expected"},
      ]},
    ]
  },
  {
    id:"cleanup", label:"Clean Up",
    groups:[
      {title:"Before you relax",items:[
        {l:"All sharps disposed in sharps container",urgent:true},
        {l:"Unused drugs discarded per protocol",n:"Witnessed waste if required"},
        {l:"Drug waste documented — EPIC / Pyxis"},
        {l:"Controlled substances accounted for — waste witnessed + signed",urgent:true},
        {l:"Anesthesia cart restocked"},
        {l:"Vaporizer and gas OFF"},
        {l:"Circuit disconnected + disposed / cleaned"},
        {l:"Blood products / remaining fluids documented + disposed"},
        {l:"Room ready for turnover — anesthesia side clean"},
      ]},
    ]
  },
];

// ─── STATE ───────────────────────────────────────────────────────
function loadData() {
  try {
    const saved = localStorage.getItem('anes_v2_data');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_PHASES));
}
function saveData() {
  localStorage.setItem('anes_v2_data', JSON.stringify(phases));
}
function loadChecks() {
  try { return JSON.parse(localStorage.getItem('anes_v2_checks') || '{}'); } catch(e) { return {}; }
}
function saveChecks() {
  localStorage.setItem('anes_v2_checks', JSON.stringify(checks));
}

let phases = loadData();
let checks = loadChecks();
let activePhase = 0;
let editMode = false;

// modal context
let modalCtx = {};

// ─── UTILS ───────────────────────────────────────────────────────
function itemKey(pi, gi, ii) { return `${phases[pi].id}-${gi}-${ii}`; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function totalItems() {
  return phases.reduce((a,p) => a + p.groups.reduce((b,g) => b + g.items.length, 0), 0);
}
function checkedCount() { return Object.values(checks).filter(Boolean).length; }
function phaseStats(pi) {
  let total=0, done=0;
  phases[pi].groups.forEach((g,gi) => g.items.forEach((_,ii) => {
    total++;
    if (checks[itemKey(pi,gi,ii)]) done++;
  }));
  return {total, done};
}

// ─── PROGRESS RING ───────────────────────────────────────────────
function updateRing() {
  const total = totalItems(), done = checkedCount();
  const pct = total ? Math.round(done/total*100) : 0;
  const circ = 106.8;
  document.getElementById('ring-fill').style.strokeDashoffset = circ - circ*pct/100;
  document.getElementById('ring-label').textContent = pct+'%';
  updateTabPips();
}
function updateTabPips() {
  phases.forEach((_,pi) => {
    const tab = document.querySelector(`.phase-tab[data-pi="${pi}"]`);
    if (!tab) return;
    const {total, done} = phaseStats(pi);
    tab.classList.remove('done','partial');
    if (done===total && total>0) tab.classList.add('done');
    else if (done>0) tab.classList.add('partial');
  });
}

// ─── EDIT MODE ───────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('edit-btn');
  btn.textContent = editMode ? '✓ Done' : '✎ Edit';
  btn.classList.toggle('active', editMode);
  const addPhaseTab = document.getElementById('add-phase-tab');
  addPhaseTab.classList.toggle('visible', editMode);
  // show/hide add-item rows
  document.querySelectorAll('.add-item-row').forEach(r => r.classList.toggle('visible', editMode));
}

// ─── RENDER ──────────────────────────────────────────────────────
function renderAll() {
  renderTabs();
  renderContent();
  updateRing();
}

function renderTabs() {
  const container = document.getElementById('phase-tabs');
  // clear existing tabs (keep add-phase-tab)
  container.querySelectorAll('.phase-tab').forEach(t => t.remove());
  const addBtn = document.getElementById('add-phase-tab');

  phases.forEach((p, pi) => {
    const btn = document.createElement('button');
    btn.className = 'phase-tab' + (pi === activePhase ? ' active' : '');
    btn.dataset.pi = pi;
    btn.innerHTML = `<span class="pip"></span>${p.label}`;
    btn.onclick = () => {
      if (editMode) { openRenamePhase(pi); return; }
      switchPhase(pi);
    };
    container.insertBefore(btn, addBtn);
  });
  updateTabPips();
}

function renderContent() {
  const container = document.getElementById('content');
  container.innerHTML = '';

  phases.forEach((p, pi) => {
    const sec = document.createElement('div');
    sec.className = 'section' + (pi === activePhase ? ' active' : '');
    sec.id = 'sec-' + pi;

    p.groups.forEach((g, gi) => {
      const grpDiv = document.createElement('div');
      grpDiv.className = 'group';

      // group header
      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <div class="group-label">${g.title}</div>
        <div class="group-actions">
          <button class="mini-btn" onclick="openRenameGroup(${pi},${gi})">rename</button>
          <button class="mini-btn danger" onclick="deleteGroup(${pi},${gi})">delete</button>
        </div>
        <div class="group-line"></div>`;
      grpDiv.appendChild(header);

      // items
      g.items.forEach((it, ii) => {
        grpDiv.appendChild(makeItemEl(pi, gi, ii, it));
      });

      // add item row
      const addRow = document.createElement('div');
      addRow.className = 'add-item-row' + (editMode ? ' visible' : '');
      addRow.innerHTML = `
        <input class="add-item-input" placeholder="Add item…" maxlength="120"
          onkeydown="if(event.key==='Enter')quickAddItem(${pi},${gi},this)">
        <button class="add-item-btn" onclick="quickAddItem(${pi},${gi},this.previousElementSibling)">Add</button>`;
      grpDiv.appendChild(addRow);

      sec.appendChild(grpDiv);
    });

    // add group button
    const addGrpRow = document.createElement('div');
    addGrpRow.className = 'add-item-row' + (editMode ? ' visible' : '');
    addGrpRow.style.borderColor = 'rgba(0,229,160,0.2)';
    addGrpRow.innerHTML = `<button class="add-item-btn" style="flex:1" onclick="openAddGroup(${pi})">+ Add group to this phase</button>`;
    sec.appendChild(addGrpRow);

    container.appendChild(sec);
  });
}

function makeItemEl(pi, gi, ii, it) {
  const k = itemKey(pi, gi, ii);
  const row = document.createElement('div');
  row.className = 'item' + (it.urgent ? ' urgent' : '') + (checks[k] ? ' checked' : '');
  row.dataset.key = k;

  row.innerHTML = `
    <button class="item-urgent-toggle" title="Toggle urgent" onclick="toggleUrgent(event,${pi},${gi},${ii})" aria-label="Toggle urgent">⚠</button>
    <div class="check-box">
      <svg class="check-icon" viewBox="0 0 11 9"><path d="M1 4.5L4 7.5L10 1"/></svg>
    </div>
    <div class="label-wrap">
      <div class="label-text">${it.urgent ? '<span class="urgent-badge">URGENT</span>' : ''}${escHtml(it.l)}</div>
      ${it.n ? `<div class="note-text">${escHtml(it.n)}</div>` : ''}
    </div>
    <button class="item-del" title="Delete" onclick="deleteItem(event,${pi},${gi},${ii})" aria-label="Delete item">×</button>`;

  // tap to check (only when not in edit mode)
  row.addEventListener('click', (e) => {
    if (editMode) {
      if (e.target.closest('.item-del') || e.target.closest('.item-urgent-toggle')) return;
      openEditItem(pi, gi, ii);
      return;
    }
    checks[k] = !checks[k];
    row.classList.toggle('checked', checks[k]);
    saveChecks();
    updateRing();
  });

  return row;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── SWITCH PHASE ────────────────────────────────────────────────
function switchPhase(pi) {
  activePhase = pi;
  document.querySelectorAll('.phase-tab').forEach((t,i) => t.classList.toggle('active', i===pi));
  document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===pi));
  document.getElementById('content').scrollTop = 0;
}
function nextTab() {
  const next = (activePhase + 1) % phases.length;
  switchPhase(next);
  document.querySelector(`.phase-tab[data-pi="${next}"]`).scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

// ─── RESET ───────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all checkboxes for a new case?')) return;
  checks = {};
  saveChecks();
  document.querySelectorAll('.item').forEach(r => r.classList.remove('checked'));
  updateRing();
}

// ─── QUICK ADD ITEM (inline) ─────────────────────────────────────
function quickAddItem(pi, gi, input) {
  const val = input.value.trim();
  if (!val) return;
  phases[pi].groups[gi].items.push({l: val});
  saveData();
  input.value = '';
  // partial re-render of this group
  const sec = document.getElementById('sec-'+pi);
  const groups = sec.querySelectorAll('.group');
  const grpDiv = groups[gi];
  const ii = phases[pi].groups[gi].items.length - 1;
  const addRow = grpDiv.querySelector('.add-item-row');
  grpDiv.insertBefore(makeItemEl(pi, gi, ii, phases[pi].groups[gi].items[ii]), addRow);
  updateRing();
}

// ─── ITEM MODAL (edit existing) ──────────────────────────────────
function openEditItem(pi, gi, ii) {
  const it = phases[pi].groups[gi].items[ii];
  modalCtx = {type:'edit', pi, gi, ii};
  document.getElementById('item-modal-title').textContent = 'Edit item';
  document.getElementById('item-label-input').value = it.l || '';
  document.getElementById('item-note-input').value = it.n || '';
  const tog = document.getElementById('urgent-toggle');
  tog.classList.toggle('on', !!it.urgent);
  document.getElementById('item-modal').classList.add('open');
  setTimeout(() => document.getElementById('item-label-input').focus(), 100);
}
function closeItemModal() {
  document.getElementById('item-modal').classList.remove('open');
  modalCtx = {};
}
function saveItemModal() {
  const label = document.getElementById('item-label-input').value.trim();
  if (!label) return;
  const note = document.getElementById('item-note-input').value.trim();
  const urgent = document.getElementById('urgent-toggle').classList.contains('on');
  const {type, pi, gi, ii} = modalCtx;
  if (type === 'edit') {
    phases[pi].groups[gi].items[ii] = {l: label, n: note || undefined, urgent: urgent || undefined};
    saveData();
    // re-render just that item
    const sec = document.getElementById('sec-'+pi);
    const grpDiv = sec.querySelectorAll('.group')[gi];
    const oldItems = grpDiv.querySelectorAll('.item');
    const oldRow = oldItems[ii];
    const newRow = makeItemEl(pi, gi, ii, phases[pi].groups[gi].items[ii]);
    grpDiv.replaceChild(newRow, oldRow);
  }
  closeItemModal();
  updateRing();
}

// ─── DELETE ITEM ─────────────────────────────────────────────────
function deleteItem(e, pi, gi, ii) {
  e.stopPropagation();
  if (!confirm('Delete this item?')) return;
  phases[pi].groups[gi].items.splice(ii, 1);
  saveData();
  // rebuild checks keys
  rebuildChecks();
  renderContent();
  updateRing();
}

// ─── TOGGLE URGENT ───────────────────────────────────────────────
function toggleUrgent(e, pi, gi, ii) {
  e.stopPropagation();
  const it = phases[pi].groups[gi].items[ii];
  it.urgent = !it.urgent;
  saveData();
  const sec = document.getElementById('sec-'+pi);
  const grpDiv = sec.querySelectorAll('.group')[gi];
  const oldRow = grpDiv.querySelectorAll('.item')[ii];
  const newRow = makeItemEl(pi, gi, ii, it);
  grpDiv.replaceChild(newRow, oldRow);
}

// ─── GROUP MODALS ─────────────────────────────────────────────────
function openAddGroup(pi) {
  modalCtx = {type:'addGroup', pi};
  document.getElementById('group-name-input').value = '';
  document.getElementById('group-modal').classList.add('open');
  setTimeout(() => document.getElementById('group-name-input').focus(), 100);
}
function closeGroupModal() {
  document.getElementById('group-modal').classList.remove('open');
  modalCtx = {};
}
function saveGroupModal() {
  const name = document.getElementById('group-name-input').value.trim();
  if (!name) return;
  const {pi} = modalCtx;
  phases[pi].groups.push({title: name, items: []});
  saveData();
  closeGroupModal();
  renderContent();
  updateRing();
}
function deleteGroup(pi, gi) {
  if (!confirm(`Delete group "${phases[pi].groups[gi].title}" and all its items?`)) return;
  phases[pi].groups.splice(gi, 1);
  saveData();
  rebuildChecks();
  renderContent();
  updateRing();
}

// ─── PHASE MODALS ─────────────────────────────────────────────────
function openAddPhase() {
  document.getElementById('phase-name-input').value = '';
  document.getElementById('phase-modal').classList.add('open');
  setTimeout(() => document.getElementById('phase-name-input').focus(), 100);
}
function closePhaseModal() {
  document.getElementById('phase-modal').classList.remove('open');
}
function savePhaseModal() {
  const name = document.getElementById('phase-name-input').value.trim();
  if (!name) return;
  phases.push({id: genId(), label: name, groups: []});
  saveData();
  closePhaseModal();
  renderAll();
  switchPhase(phases.length - 1);
}

// ─── RENAME MODALS ───────────────────────────────────────────────
function openRenamePhase(pi) {
  modalCtx = {type:'renamePhase', pi};
  document.getElementById('rename-modal-title').textContent = 'Rename phase';
  document.getElementById('rename-input').value = phases[pi].label;
  document.getElementById('rename-modal').classList.add('open');
  setTimeout(() => document.getElementById('rename-input').focus(), 100);
}
function openRenameGroup(pi, gi) {
  modalCtx = {type:'renameGroup', pi, gi};
  document.getElementById('rename-modal-title').textContent = 'Rename group';
  document.getElementById('rename-input').value = phases[pi].groups[gi].title;
  document.getElementById('rename-modal').classList.add('open');
  setTimeout(() => document.getElementById('rename-input').focus(), 100);
}
function closeRenameModal() {
  document.getElementById('rename-modal').classList.remove('open');
  modalCtx = {};
}
function saveRename() {
  const val = document.getElementById('rename-input').value.trim();
  if (!val) return;
  const {type, pi, gi} = modalCtx;
  if (type === 'renamePhase') {
    phases[pi].label = val;
    saveData();
    renderTabs();
  } else if (type === 'renameGroup') {
    phases[pi].groups[gi].title = val;
    saveData();
    renderContent();
  }
  closeRenameModal();
}

// ─── REBUILD CHECKS after structural change ───────────────────────
function rebuildChecks() {
  // checks keys are positional so after deletions we just clear and re-key
  // simpler: just clear checks for safety (rare destructive op)
  checks = {};
  saveChecks();
}

// ─── CLOSE MODALS ON OVERLAY CLICK ───────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('open');
      modalCtx = {};
    }
  });
});

// ─── KEYBOARD ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
    modalCtx = {};
  }
  if (e.key === 'Enter') {
    if (document.getElementById('rename-modal').classList.contains('open')) saveRename();
    if (document.getElementById('group-modal').classList.contains('open')) saveGroupModal();
    if (document.getElementById('phase-modal').classList.contains('open')) savePhaseModal();
    if (document.getElementById('item-modal').classList.contains('open')) saveItemModal();
  }
});

// ─── INIT ────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
