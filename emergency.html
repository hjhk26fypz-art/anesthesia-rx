<style>
:root{--bg:#0a0f14;--sf:#111820;--sf2:#182030;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--ac:#00e5a0;--rd:#ff4d6d;--am:#ffb547;--bl:#4da6ff;--pu:#a78bfa;--tx:#e8f0f8;--mu:rgba(232,240,248,0.45);--fa:rgba(232,240,248,0.18)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;background:var(--bg)}
body{font-family:'DM Mono',monospace;color:var(--tx);display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.sa-spacer{height:env(safe-area-inset-top,44px);background:var(--bg);position:sticky;top:0;z-index:101}
.topbar{position:sticky;top:env(safe-area-inset-top,44px);z-index:100;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--rd)}
.app-title span{color:var(--tx)}
.wt-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:10px}
.wt-label{font-size:11px;color:var(--mu);white-space:nowrap}
.wt-input{background:var(--sf2);border:1px solid var(--bd2);border-radius:8px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:14px;color:var(--tx);outline:none;width:80px;caret-color:var(--ac)}
.wt-input:focus{border-color:var(--ac)}
.wt-unit{font-size:11px;color:var(--mu)}
.tabs{display:flex;overflow-x:auto;gap:0;background:var(--sf);border-bottom:1px solid var(--bd);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 13px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--rd);border-bottom-color:var(--rd)}
.content{flex:1;overflow-y:auto;padding:0 0 calc(env(safe-area-inset-bottom,0px) + 20px)}
.proto-card{border-radius:14px;margin-bottom:14px;overflow:hidden;border:1px solid rgba(255,77,109,0.3);background:rgba(255,77,109,0.04)}
.proto-card.amber{border-color:rgba(255,181,71,0.3);background:rgba(255,181,71,0.04)}
.proto-card.blue{border-color:rgba(77,166,255,0.3);background:rgba(77,166,255,0.04)}
.proto-card.green{border-color:rgba(0,229,160,0.3);background:rgba(0,229,160,0.04)}
.proto-header{padding:12px 16px;border-bottom:1px solid rgba(255,77,109,0.2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.proto-card.amber .proto-header{border-bottom-color:rgba(255,181,71,0.2)}
.proto-card.blue .proto-header{border-bottom-color:rgba(77,166,255,0.2)}
.proto-card.green .proto-header{border-bottom-color:rgba(0,229,160,0.2)}
.proto-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--rd)}
.proto-card.amber .proto-title{color:var(--am)}
.proto-card.blue .proto-title{color:var(--bl)}
.proto-card.green .proto-title{color:var(--ac)}
.badge{font-size:9px;padding:3px 9px;border-radius:999px;white-space:nowrap;border:1px solid}
.badge-red{background:rgba(255,77,109,0.15);color:var(--rd);border-color:rgba(255,77,109,0.3)}
.badge-amber{background:rgba(255,181,71,0.15);color:var(--am);border-color:rgba(255,181,71,0.3)}
.badge-green{background:rgba(0,229,160,0.15);color:var(--ac);border-color:rgba(0,229,160,0.3)}
.badge-blue{background:rgba(77,166,255,0.15);color:var(--bl);border-color:rgba(77,166,255,0.3)}
.proto-sub{font-size:10px;color:var(--mu)}
.steps{padding:12px 16px}
.step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.step:last-child{margin-bottom:0}
.snum{width:26px;height:26px;min-width:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px;flex-shrink:0}
.snum-red{background:var(--rd);color:#fff}
.snum-amber{background:var(--am);color:#000}
.snum-green{background:var(--ac);color:#000}
.snum-blue{background:var(--bl);color:#fff}
.sbody{}
.stxt{font-size:13px;line-height:1.5;color:var(--tx)}
.ssub{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.5}
.sdose{font-size:13px;font-weight:500;color:var(--rd);margin-top:3px;line-height:1.5}
.dose-box{background:var(--sf2);border-radius:10px;padding:10px 14px;margin:6px 0 12px;border:1px solid var(--bd2)}
.dose-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd)}
.dose-row:last-child{border-bottom:none}
.dlabel{font-size:11px;color:var(--mu)}
.dval{font-size:13px;font-weight:500;color:var(--rd)}
.hotline{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:10px;padding:10px 14px;margin:0 0 12px;font-size:12px;color:var(--rd);text-align:center;letter-spacing:0.04em}
</style>
</head>
<body>
<div class="sa-spacer"></div>
<div class="topbar">
  <div class="app-title">STAT<span> Protocols</span></div>
  <span class="badge badge-red">Emergency</span>
</div>
<div class="wt-bar">
  <span class="wt-label">Patient weight</span>
  <input class="wt-input" type="number" id="wt" placeholder="70" min="1" max="300" oninput="renderAll()">
  <span class="wt-unit">kg</span>
</div>
<div class="tabs">
  <button class="tab active" onclick="sw(0,this)">Airway</button>
  <button class="tab" onclick="sw(1,this)">Cardiac</button>
  <button class="tab" onclick="sw(2,this)">Anaphylaxis</button>
  <button class="tab" onclick="sw(3,this)">MH</button>
  <button class="tab" onclick="sw(4,this)">Pulm</button>
  <button class="tab" onclick="sw(5,this)">Metabolic</button>
  <button class="tab" onclick="sw(6,this)">OB</button>
  <button class="tab" onclick="sw(7,this)">Other</button>
</div>
<div class="content" id="mainContent"></div>
<script>

var activeTab = 0;

function sw(idx, btn) {
  activeTab = idx;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  btn.classList.add('active');
  renderAll();
}

function getWt() {
  return parseFloat(document.getElementById('wt').value) || null;
}

function fmt(n) { return Math.round(n); }
function fmt1(n) { return n.toFixed(1); }
function fmt2(n) { return n.toFixed(2); }

function step(num, cls, txt, sub, dose) {
  var h = '<div class="step">';
  h += '<div class="snum snum-' + cls + '">' + num + '</div>';
  h += '<div class="sbody"><div class="stxt">' + txt + '</div>';
  if (sub) h += '<div class="ssub">' + sub + '</div>';
  if (dose) h += '<div class="sdose">' + dose + '</div>';
  h += '</div></div>';
  return h;
}

function card(title, sub, cls, badge, content) {
  var h = '<div class="proto-card ' + (cls || '') + '">';
  h += '<div class="proto-header"><div>';
  h += '<div class="proto-title">' + title + '</div>';
  if (sub) h += '<div class="proto-sub">' + sub + '</div>';
  h += '</div>';
  if (badge) h += '<span class="badge badge-' + cls + '">' + badge + '</span>';
  h += '</div><div class="steps">' + content + '</div></div>';
  return h;
}

function dbox(rows) {
  var h = '<div class="dose-box">';
  for (var i = 0; i < rows.length; i++) {
    h += '<div class="dose-row"><span class="dlabel">' + rows[i][0] + '</span><span class="dval">' + rows[i][1] + '</span></div>';
  }
  return h + '</div>';
}

function hotline(txt) {
  return '<div class="hotline">' + txt + '</div>';
}

function renderAirway(wt) {
  var h = '';

  h += card('Laryngospasm', 'Partial or complete glottic closure', 'red', 'AIRWAY EMERGENCY',
    step(1,'red','Remove ALL airway stimulation immediately','Stop instrumentation, suctioning, lighten if light anesthesia') +
    step(2,'red','Call for help','') +
    step(3,'amber','100% O2 + jaw thrust + CPAP 20-40 cmH2O','Tight mask seal. Positive pressure may break partial laryngospasm.') +
    step(4,'red','Succinylcholine if not breaking',
      wt ? 'IV: ' + fmt(wt*1.5) + ' mg (1.5 mg/kg) | IM deltoid: ' + fmt(wt*4) + ' mg (4 mg/kg) if no IV' :

      wt ? 'Or ' + fmt(wt*15) + ' mg (15 mg/kg) - give EARLY' : '1g IV - give as early as possible') +
    step(4,'amber','Permissive hypotension MAP 50-65 until surgical control','Avoid excess crystalloid') +
    step(5,'amber','Calcium chloride 1g IV per 4 units pRBC','Replace ionized calcium depleted by citrate in blood') +
    step(6,'amber','Fibrinogen concentrate 4g or cryo 10 units if fibrinogen < 1.5','') +
    step(7,'blue','Warm ALL IV fluids and blood products','Prevent hypothermia-induced coagulopathy') +
    step(8,'green','TEG or ROTEM guided resuscitation if available','Goal-directed coagulation management')
  );

  h += card('Acute Transfusion Reaction', 'Hemolytic or anaphylactic transfusion reaction', 'red', 'STOP TRANSFUSION',
    step(1,'red','STOP transfusion immediately','') +
    step(2,'red','Maintain IV access with new tubing','Do NOT use same IV tubing') +
    step(3,'red','Verify patient identity and blood product labels','Most reactions are clerical errors') +
    step(4,'amber','IV fluids 1-2 L crystalloid - maintain BP and renal perfusion','') +
    step(5,'amber','Diphenhydramine 25-50 mg IV for allergic reaction','') +
    step(6,'amber','Epinephrine 0.3 mg IM or 50-100 mcg IV for anaphylactic reaction','') +
    step(7,'blue','Furosemide to maintain UO > 1 mL/kg/hr','Prevent hemoglobin renal injury') +
    step(8,'green','Send blood bank sample + blood product + patient ID','DAT, urinalysis, plasma hemoglobin') +
    step(9,'green','Notify blood bank immediately','')
  );

  h += card('Power Failure / Machine Failure', 'Loss of ventilator or monitoring', 'red', 'EMERGENCY',
    step(1,'red','Switch to manual bag ventilation immediately','Disconnect ventilator - bag patient') +
    step(2,'red','O2 cylinder backup - open cylinder valve','') +
    step(3,'amber','Maintain anesthesia - switch to TIVA if volatile unavailable','Propofol + opioid infusion') +
    step(4,'amber','Use backup monitoring - pulse ox + precordial stethoscope','Finger on pulse') +
    step(5,'green','Call for backup machine or move to backup OR','')
  );

  h += card('Intraop Stroke', 'New focal deficit or altered consciousness', 'amber', 'URGENT',
    step(1,'amber','Maintain MAP > 80 mmHg - cerebral perfusion pressure support','') +
    step(2,'amber','Avoid hypocapnia - maintain PaCO2 35-45 mmHg','') +
    step(3,'amber','Maintain normoglycemia 140-180 mg/dL','Hyper and hypoglycemia both worsen outcome') +
    step(4,'amber','Notify neurology and neurosurgery immediately','') +
    step(5,'blue','tPA contraindicated in perioperative period','Surgical patients excluded from thrombolytics') +
    step(6,'green','Mechanical thrombectomy may still be option for large vessel occlusion','Discuss urgently with neurology')
  );

  h += card('Pacemaker or ICD Emergency', 'Intraop device malfunction or inappropriate shock', 'amber', 'URGENT',
    step(1,'amber','Apply magnet over ICD to suspend tachyarrhythmia detection','Prevents inappropriate shocks from electrocautery') +
    step(2,'amber','Use bipolar cautery - minimizes electromagnetic interference','') +
    step(3,'amber','Transcutaneous pacing pads on all pacemaker-dependent patients','Backup if pacemaker is inhibited') +
    step(4,'green','Magnet over pacemaker converts to asynchronous mode at fixed rate','Rate 85 bpm typically')
  );

  return h;
}

function renderAll() {
  var wt = getWt();
  var con = document.getElementById('mainContent');
  var h = '<div style="padding:14px 16px">';
  if (activeTab === 0) h += renderAirway(wt);
  else if (activeTab === 1) h += renderCardiac(wt);
  else if (activeTab === 2) h += renderAnaphylaxis(wt);
  else if (activeTab === 3) h += renderMH(wt);
  else if (activeTab === 4) h += renderPulm(wt);
  else if (activeTab === 5) h += renderMetabolic(wt);
  else if (activeTab === 6) h += renderOB(wt);
  else if (activeTab === 7) h += renderOther(wt);
  h += '</div>';
  con.innerHTML = h;
}

renderAll();

</script>
